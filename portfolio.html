<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Mehedul | Video Editor & Motion Graphics Artist</title>
<meta name="description" content="Full portfolio of commercial ads, YouTube edits, motion graphics, reels, and shorts by Mehedul, video editor and motion graphics artist.">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ LOADING SCREEN ============ -->
<div id="loader">
  <div class="loader-inner">
    <span class="loader-mark">M.</span>
    <div class="loader-count"><span id="loaderPercent">0</span>%</div>
  </div>
  <div class="loader-bar"><div class="loader-bar-fill" id="loaderFill"></div></div>
</div>

<!-- ============ CUSTOM CURSOR ============ -->
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- ============ SCRUB PROGRESS BAR ============ -->
<div class="scrub-bar" aria-hidden="true">
  <div class="scrub-track">
    <div class="scrub-fill" id="scrubFill"></div>
    <div class="scrub-playhead" id="scrubPlayhead"></div>
  </div>
</div>

<!-- ============ NAVBAR ============ -->
<header class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">MEHEDUL<span class="dot">.</span></a>
    <nav class="nav-links">
      <a href="index.html" data-magnetic>Home</a>
      <a href="index.html#about" data-magnetic>About</a>
      <a href="index.html#services" data-magnetic>Services</a>
      <a href="index.html#experience" data-magnetic>Experience</a>
      <a href="index.html#contact" data-magnetic>Contact</a>
    </nav>
    <a href="index.html#contact" class="btn btn-small btn-outline" data-magnetic>Hire Me</a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="nav-mobile" id="navMobile">
    <a href="index.html">Home</a>
    <a href="index.html#about">About</a>
    <a href="index.html#services">Services</a>
    <a href="index.html#experience">Experience</a>
    <a href="index.html#contact">Contact</a>
  </div>
</header>

<main>

<!-- ============ PORTFOLIO ============ -->
<section class="portfolio portfolio-page" id="work">
  <div class="container">
    <p class="timecode reveal-up">00:00:00:04 — SELECTED WORK</p>
    <h1 class="section-title reveal-up">Frames worth<br>freezing on.</h1>

    <div class="filter-bar reveal-up">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="commercial">Showreel</button>
      <button class="filter-btn" data-filter="youtube">Talkinghead Video</button>
      <button class="filter-btn" data-filter="motion">Motion video</button>
      <button class="filter-btn" data-filter="reels">Documentary</button>
      <button class="filter-btn" data-filter="shorts">Shorts</button>
    </div>

    <div class="portfolio-grid" id="portfolioGrid">
      <!-- cards injected by portfolio.js from the projects array -->
    </div>
  </div>
</section>

<!-- Portfolio modal -->
<div class="modal" id="portfolioModal">
  <div class="modal-backdrop" data-close-modal></div>
  <div class="modal-panel">
    <button class="modal-close" data-close-modal aria-label="Close">&times;</button>
    <div class="modal-video">
      <iframe id="modalVideo" src="" title="Project video" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen></iframe>
    </div>
    <div class="modal-info">
      <span class="modal-category" id="modalCategory">Commercial</span>
      <h3 id="modalTitle">Project Title</h3>
      <p id="modalDesc">Project description.</p>
    </div>
  </div>
</div>

</main>

<!-- ============ FOOTER ============ -->
<footer class="footer">
  <div class="container footer-inner">
    <a href="index.html" class="nav-logo">MEHEDUL<span class="dot">.</span></a>
    <nav class="footer-links">
      <a href="index.html">Home</a>
      <a href="index.html#about">About</a>
      <a href="index.html#services">Services</a>
      <a href="index.html#contact">Contact</a>
    </nav>
    <div class="footer-socials">
      <a href="#" aria-label="Facebook">FB</a>
      <a href="#" aria-label="LinkedIn">IN</a>
      <a href="#" aria-label="Instagram">IG</a>
    </div>
  </div>
  <div class="container footer-bottom">
    <span>© <span id="year"></span> Mehedul. All rights reserved.</span>
    <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>
  </div>
</footer>

<!-- ============ SCRIPTS ============ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
<script src="portfolio.js"></script>
</body>
</html>
